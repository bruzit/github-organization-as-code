---
name: Semantic Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    uses: bruzit/github-actions-and-workflows/.github/workflows/semantic-release.yaml@v0.2.0
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      GH_APP_ID: ${{ vars.GH_APP_ID }}
    secrets:
      GH_APP_PEM_FILE: ${{ secrets.GH_APP_PEM_FILE }}
